---
# pb_deploy_report.yml
#
# Second step in the Circuit Failover workflow.
#
# Re-queries NetBox for the current state of the failed circuit and its
# backup, generates the HTML failover report, then deploys it to the
# report web server.
#
# Expects 'failed_circuit' to be set as an extra var (passed through
# from the workflow).
#
# Usage (manual):
#   ansible-playbook ansible/pb_deploy_report.yml \
#     --extra-vars "failed_circuit=IPLC-GB-AT-PRI"

- name: "Generate and deploy failover report — {{ failed_circuit }}"
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - vars/netbox_creds.yml

  vars:
    failed_circuit: "IPLC-GB-AT-PRI"
    report_filename: "failover_report.html"
    report_dir: "{{ playbook_dir }}/reports"

  tasks:
    - name: Create report directory
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: "0755"

    # ── Re-query current circuit state from NetBox ────────────────────────────

    - name: Query failed circuit from NetBox
      ansible.builtin.set_fact:
        failed_result: >-
          {{ query('netbox.netbox.nb_lookup', 'circuits',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='cid=' ~ failed_circuit,
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    - name: Set primary circuit facts
      ansible.builtin.set_fact:
        primary: "{{ failed_result | first }}"

    - name: Query primary circuit terminations
      ansible.builtin.set_fact:
        primary_terms: >-
          {{ query('netbox.netbox.nb_lookup', 'circuit-terminations',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='circuit_id=' ~ primary.id,
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    - name: Assert terminations exist for both sides
      ansible.builtin.assert:
        that:
          - primary_terms | selectattr('term_side', 'eq', 'A') | list | length > 0
          - primary_terms | selectattr('term_side', 'eq', 'Z') | list | length > 0
        fail_msg: >-
          Circuit {{ failed_circuit }} (id={{ primary.id }}) is missing A/Z terminations in NetBox.
          Found {{ primary_terms | length }} termination(s):
          {{ primary_terms | map(attribute='term_side') | list }}.

    - name: Set A-side and Z-side sites
      ansible.builtin.set_fact:
        a_side_site: "{{ (primary_terms | selectattr('term_side', 'eq', 'A') | first).termination }}"
        z_side_site: "{{ (primary_terms | selectattr('term_side', 'eq', 'Z') | first).termination }}"

    # ── Find the active backup circuit ───────────────────────────────────────
    # The failover playbook has already activated the backup, so we query for
    # active circuits at both sites to find it.

    - name: Query active circuits at A-side site
      ansible.builtin.set_fact:
        a_site_circuits: >-
          {{ query('netbox.netbox.nb_lookup', 'circuits',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='site_id=' ~ a_side_site.id ~ ' tag=dd status=active',
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    - name: Query active circuits at Z-side site
      ansible.builtin.set_fact:
        z_site_circuits: >-
          {{ query('netbox.netbox.nb_lookup', 'circuits',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='site_id=' ~ z_side_site.id ~ ' tag=dd status=active',
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    - name: Find active backup circuit (present at both sites, not the failed one)
      ansible.builtin.set_fact:
        z_circuit_ids: "{{ z_site_circuits | map(attribute='id') | list }}"
        backup_candidates: >-
          {{
            a_site_circuits
            | selectattr('id', 'in', z_site_circuits | map(attribute='id') | list)
            | rejectattr('id', 'eq', primary.id)
            | list
          }}

    - name: Select backup circuit (highest commit rate)
      ansible.builtin.set_fact:
        backup: "{{ backup_candidates | sort(attribute='commit_rate', reverse=true) | first }}"

    - name: Query backup circuit terminations
      ansible.builtin.set_fact:
        backup_terms: >-
          {{ query('netbox.netbox.nb_lookup', 'circuit-terminations',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='circuit_id=' ~ backup.id,
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    - name: Set backup site labels
      ansible.builtin.set_fact:
        backup_a_site: "{{ (backup_terms | selectattr('term_side', 'eq', 'A') | first).termination.display }}"
        backup_z_site: "{{ (backup_terms | selectattr('term_side', 'eq', 'Z') | first).termination.display }}"

    # ── Query routers at both sites ───────────────────────────────────────────

    - name: Query routers at A-side site
      ansible.builtin.set_fact:
        a_side_routers: >-
          {{ query('netbox.netbox.nb_lookup', 'devices',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='site_id=' ~ a_side_site.id ~ ' role=router tag=dd',
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    - name: Query routers at Z-side site
      ansible.builtin.set_fact:
        z_side_routers: >-
          {{ query('netbox.netbox.nb_lookup', 'devices',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='site_id=' ~ z_side_site.id ~ ' role=router tag=dd',
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    - name: Combine router list
      ansible.builtin.set_fact:
        all_routers: "{{ a_side_routers + z_side_routers }}"

    # ── Generate HTML report ──────────────────────────────────────────────────

    - name: Generate HTML failover report
      ansible.builtin.template:
        src: templates/failover_report.html.j2
        dest: "{{ report_dir }}/{{ report_filename }}"
        mode: "0644"
        backup: true
      vars:
        primary_a_site: "{{ a_side_site.display }}"
        primary_z_site: "{{ z_side_site.display }}"
        routers: "{{ all_routers }}"
        a_site: "{{ a_side_site }}"
        z_site: "{{ z_side_site }}"
        candidates: "{{ backup_candidates }}"
        netbox_base_url: "{{ netbox_url }}"

    - name: Report generated
      ansible.builtin.debug:
        msg: "Report generated: {{ report_dir }}/{{ report_filename }}"
        verbosity: 0

# ── Play 2: Register report server (if configured) ────────────────────────────

- name: Register report server for publishing
  hosts: localhost
  gather_facts: false

  vars:
    report_server_host: "{{ lookup('env', 'REPORT_SERVER_HOST') }}"
    report_server_port: "{{ lookup('env', 'REPORT_SERVER_PORT') | default('2222', true) }}"
    report_url: "{{ lookup('env', 'REPORT_URL') }}"
    report_filename: "failover_report.html"

  tasks:
    - name: Skip if no report server configured
      ansible.builtin.meta: end_play
      when: report_server_host | length == 0

    - name: Add report server to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ report_server_host }}"
        groups: report_servers
        ansible_port: "{{ report_server_port }}"
        ansible_user: "ec2-user"
        report_filename: "{{ report_filename }}"
        report_url: "{{ report_url | default('https://' + report_server_host + '/' + report_filename, true) }}"

# ── Play 3: Publish report to web server ──────────────────────────────────────

- name: Publish failover report to web server
  hosts: report_servers
  gather_facts: false

  tasks:
    - name: Ensure web root exists
      ansible.builtin.file:
        path: /var/www/html
        state: directory
        mode: "0755"
      become: true

    - name: Upload failover report
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/reports/{{ report_filename }}"
        dest: "/var/www/html/{{ report_filename }}"
        mode: "0644"
        backup: true
      become: true

    - name: Report published
      ansible.builtin.debug:
        msg: "Report live at {{ report_url }}"
        verbosity: 0
