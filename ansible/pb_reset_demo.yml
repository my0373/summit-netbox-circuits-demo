---
# pb_reset_demo.yml
#
# Resets all demo circuits back to 'active' status in NetBox.
# Run this between demo runs to restore the starting state.
#
# Usage:
#   ansible-playbook ansible/pb_reset_demo.yml

- name: Reset demo circuits to active
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/netbox_creds.yml

  tasks:

    - name: Fetch all circuits tagged 'dd'
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/?tag=dd&limit=100"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
      register: all_circuits

    - name: Find circuits that are not active (need resetting)
      ansible.builtin.set_fact:
        circuits_to_reset: >-
          {{
            all_circuits.json.results
            | rejectattr('status.value', 'eq', 'active')
            | list
          }}

    - name: Report what will be reset
      ansible.builtin.debug:
        msg: >-
          Found {{ circuits_to_reset | length }} circuit(s) to reset:
          {{ circuits_to_reset | map(attribute='cid') | join(', ') | default('none') }}

    - name: Reset circuits to active
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/{{ item.id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          status: "active"
        status_code: 200
      loop: "{{ circuits_to_reset }}"
      loop_control:
        label: "{{ item.cid }}"
      register: reset_results

    - name: Confirm reset
      ansible.builtin.debug:
        msg: "{{ item.item.cid }}: {{ item.item.status.label }} → {{ item.json.status.label }}"
      loop: "{{ reset_results.results }}"
      loop_control:
        label: "{{ item.item.cid }}"
      when: reset_results.results | length > 0

    # ── Set Bristol–Manila circuits offline ───────────────────────────────────
    # The demo uses Bristol–Atlanta. The GB-PH circuits should show as offline
    # so the Visual Explorer map focuses on the correct topology.

    - name: Find Bristol–Manila circuits to set offline
      ansible.builtin.set_fact:
        ph_circuits: >-
          {{
            all_circuits.json.results
            | selectattr('cid', 'match', '.*-PH-.*|MPLS-GB-PH.*')
            | rejectattr('status.value', 'eq', 'offline')
            | list
          }}

    - name: Report Bristol–Manila circuits being set offline
      ansible.builtin.debug:
        msg: >-
          Setting {{ ph_circuits | length }} Bristol–Manila circuit(s) to offline:
          {{ ph_circuits | map(attribute='cid') | join(', ') | default('none') }}

    - name: Set Bristol–Manila circuits to offline
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/{{ item.id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          status: "offline"
        status_code: 200
      loop: "{{ ph_circuits }}"
      loop_control:
        label: "{{ item.cid }}"

    - name: All done
      ansible.builtin.debug:
        msg: >-
          Demo reset complete.
          {{ circuits_to_reset | length }} circuit(s) restored to Active.
          {{ ph_circuits | length }} Bristol–Manila circuit(s) set to Offline.
          NetBox and Visual Explorer are back to starting state.
