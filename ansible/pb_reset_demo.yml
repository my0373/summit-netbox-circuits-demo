---
# pb_reset_demo.yml
#
# Resets the demo circuits in NetBox to their starting state:
#   - IPLC-GB-AT-PRI → active   (the circuit that "fails" in the demo)
#   - IPLC-GB-AT-SEC → offline  (the backup, brought online by automation)
#   - All other dd-tagged circuits → active
#
# Usage:
#   ansible-playbook ansible/pb_reset_demo.yml

- name: Reset demo circuits
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/netbox_creds.yml

  vars:
    primary_circuit: "IPLC-GB-AT-PRI"
    offline_circuits:
      - IPLC-GB-AT-SEC
    router_username: "{{ lookup('env', 'ANSIBLE_NET_USERNAME') | default('iosuser', true) }}"
    router_password: "{{ lookup('env', 'ANSIBLE_NET_PASSWORD') | default(ansible_password | default(''), true) }}"
    router_primary_gw: "172.16.0.1"
    router_backup_gw: "172.16.1.1"

  tasks:

    - name: Fetch all circuits tagged 'dd'
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/?tag=dd&limit=100"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      register: all_circuits

    # ── Set all dd-tagged circuits to active ──────────────────────────────────

    - name: Find circuits that are not active
      ansible.builtin.set_fact:
        circuits_to_activate: >-
          {{
            all_circuits.json.results
            | rejectattr('status.value', 'eq', 'active')
            | rejectattr('cid', 'in', offline_circuits)
            | list
          }}

    - name: Restore all other circuits to active
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/{{ item.id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          status: "active"
        status_code: 200
      loop: "{{ circuits_to_activate }}"
      loop_control:
        label: "{{ item.cid }}"

    # ── Set primary circuit active ─────────────────────────────────────────────

    - name: Find primary circuit
      ansible.builtin.set_fact:
        primary: >-
          {{
            all_circuits.json.results
            | selectattr('cid', 'eq', primary_circuit)
            | first
          }}

    - name: Set primary circuit to active
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/{{ primary.id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          status: "active"
        status_code: 200
      when: primary.status.value != 'active'
      register: primary_result

    - name: Confirm primary circuit status
      ansible.builtin.debug:
        msg: "{{ primary_circuit }}: {{ primary.status.label }}{{ ' → Active' if primary.status.value != 'active' else ' (already active)' }}"

    # ── Set specified circuits offline ─────────────────────────────────────────

    - name: Build list of circuits to set offline (skipping any already offline)
      ansible.builtin.set_fact:
        circuits_to_offline: >-
          {{
            all_circuits.json.results
            | selectattr('cid', 'in', offline_circuits)
            | rejectattr('status.value', 'eq', 'offline')
            | list
          }}

    - name: Report circuits being set offline
      ansible.builtin.debug:
        msg: >-
          Setting {{ circuits_to_offline | length }} circuit(s) to offline:
          {{ circuits_to_offline | map(attribute='cid') | join(', ') | default('none — all already offline') }}

    - name: Set circuits to offline
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/{{ item.id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          status: "offline"
        status_code: 200
      loop: "{{ circuits_to_offline }}"
      loop_control:
        label: "{{ item.cid }}"

    - name: All done
      ansible.builtin.debug:
        msg: >-
          Reset complete.
          {{ primary_circuit }} is Active. IPLC-GB-AT-SEC is Offline.
          {{ circuits_to_activate | length }} other circuit(s) restored to Active.
          NetBox and Visual Explorer are back to starting state.

    # ── Discover live routers at the primary's sites ──────────────────────────
    # Reset doesn't need cable traversal (that's a failover-narrative thing).
    # We just need to find ALL dd-tagged routers at the sites involved in the
    # demo and push the reset config to whichever ones have a public IP.
    # This is robust against future topology changes — cables can be rewired,
    # circuits can be added, but as long as the live router stays at one of
    # the demo sites with the dd tag, this still finds it.

    - name: Get primary circuit's A and Z site IDs
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuit-terminations/?circuit_id={{ primary.id }}"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      register: primary_terms_for_reset

    - name: Set A/Z site IDs
      ansible.builtin.set_fact:
        reset_a_site_id: "{{ (primary_terms_for_reset.json.results | selectattr('term_side', 'eq', 'A') | first).termination.id }}"
        reset_z_site_id: "{{ (primary_terms_for_reset.json.results | selectattr('term_side', 'eq', 'Z') | first).termination.id }}"

    - name: Query dd-tagged routers at both sites
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/devices/?role=router&tag=dd&site_id={{ item }}"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      loop:
        - "{{ reset_a_site_id }}"
        - "{{ reset_z_site_id }}"
      register: site_router_lookups

    - name: Register reachable routers (public IP) for route reset
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: cisco_reset_routers
        ansible_host: "{{ ip_addr }}"
        ansible_user: "{{ router_username }}"
        ansible_password: "{{ router_password }}"
        ansible_network_os: cisco.ios.ios
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_cli_ssh_type: paramiko
        ansible_become: true
        ansible_become_method: enable
        ansible_host_key_checking: false
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        primary_gw: "{{ router_primary_gw }}"
        backup_gw: "{{ router_backup_gw }}"
      loop: "{{ site_router_lookups.results | map(attribute='json.results') | flatten | list }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        ip_addr: "{{ item.primary_ip4.address.split('/')[0] if item.primary_ip4 else '' }}"
        ip_octets: "{{ ip_addr.split('.') if ip_addr else ['0','0','0','0'] }}"
        is_rfc1918: >-
          {{ ip_addr.startswith('10.')
             or ip_addr.startswith('192.168.')
             or (ip_addr.startswith('172.') and (ip_octets[1] | int) >= 16 and (ip_octets[1] | int) <= 31) }}
      when:
        - ip_addr != ''
        - not is_rfc1918

# ── Play 2: Restore primary route on A-side router ────────────────────────────

- name: Restore primary default route on router
  hosts: cisco_reset_routers
  gather_facts: false
  ignore_unreachable: true

  tasks:

    - name: Reset router config (best-effort — failures don't stop the reset)
      block:
        - name: Remove backup route and restore primary route
          cisco.ios.ios_config:
            lines:
              - "no ip route 0.0.0.0 0.0.0.0 {{ hostvars[inventory_hostname]['backup_gw'] }}"
              - "ip route 0.0.0.0 0.0.0.0 {{ hostvars[inventory_hostname]['primary_gw'] }}"
            save_when: changed

        - name: Read running-config for verification
          cisco.ios.ios_command:
            commands:
              - show running-config | include ^ip route
          register: running_routes

        - name: Verify primary route present and backup route absent
          ansible.builtin.assert:
            that:
              - "(running_routes.stdout[0] | regex_search('ip route 0\\\\.0\\\\.0\\\\.0 0\\\\.0\\\\.0\\\\.0 ' + (hostvars[inventory_hostname]['primary_gw'] | regex_escape))) is not none"
              - "(running_routes.stdout[0] | regex_search('ip route 0\\\\.0\\\\.0\\\\.0 0\\\\.0\\\\.0\\\\.0 ' + (hostvars[inventory_hostname]['backup_gw'] | regex_escape))) is none"
            fail_msg: |
              Reset verification failed on {{ inventory_hostname }}!
              Expected primary route ({{ hostvars[inventory_hostname]['primary_gw'] }}) to be present
              and backup route ({{ hostvars[inventory_hostname]['backup_gw'] }}) to be absent.
              Actual running-config:
              {{ running_routes.stdout[0] }}

        - name: Confirm route restored
          ansible.builtin.debug:
            msg: |
              Router {{ inventory_hostname }} reset OK — primary route active.
              {{ running_routes.stdout[0] }}
      rescue:
        - name: Router reset failed — surface clearly so it isn't missed
          ansible.builtin.fail:
            msg: |
              ROUTER RESET FAILED on {{ inventory_hostname }}.
              {{ ansible_failed_result.msg | default('unknown error') }}
              NetBox is back to starting state, but the router config was
              not reverted. Investigate before running the demo.
