---
# pb_reset_demo.yml
#
# Resets the demo circuits in NetBox to their starting state:
#   - IPLC-GB-AT-PRI → active   (the circuit that "fails" in the demo)
#   - IPLC-GB-AT-SEC → offline  (the backup, brought online by automation)
#   - All other dd-tagged circuits → active
#
# Usage:
#   ansible-playbook ansible/pb_reset_demo.yml

- name: Reset demo circuits
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/netbox_creds.yml

  vars:
    primary_circuit: "IPLC-GB-AT-PRI"
    offline_circuits:
      - IPLC-GB-AT-SEC

  tasks:
    - name: Fetch all circuits tagged 'dd'
      ansible.builtin.set_fact:
        all_circuits: >-
          {{ query('netbox.netbox.nb_lookup', 'circuits',
                   api_endpoint=netbox_url,
                   token=netbox_token,
                   api_filter='tag=dd',
                   validate_certs=netbox_validate_certs,
                   raw_data=true) }}

    # ── Set all dd-tagged circuits to active ──────────────────────────────────

    - name: Find circuits that are not active
      ansible.builtin.set_fact:
        circuits_to_activate: >-
          {{
            all_circuits
            | rejectattr('status.value', 'eq', 'active')
            | rejectattr('cid', 'in', offline_circuits)
            | list
          }}

    - name: Restore all other circuits to active
      netbox.netbox.netbox_circuit:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          cid: "{{ item.cid }}"
          status: "Active"
        state: present
      loop: "{{ circuits_to_activate }}"
      loop_control:
        label: "{{ item.cid }}"

    # ── Set primary circuit active ─────────────────────────────────────────────

    - name: Find primary circuit
      ansible.builtin.set_fact:
        primary: >-
          {{
            all_circuits
            | selectattr('cid', 'eq', primary_circuit)
            | first
          }}

    - name: Set primary circuit to active
      netbox.netbox.netbox_circuit:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          cid: "{{ primary.cid }}"
          status: "Active"
        state: present
      when: primary.status.value != 'active'
      register: primary_result

    - name: Confirm primary circuit status
      ansible.builtin.debug:
        msg: "{{ primary_circuit }}: {{ primary.status.label }}{{ ' → Active' if primary.status.value != 'active' else ' (already active)' }}"
        verbosity: 0

    # ── Set specified circuits offline ─────────────────────────────────────────

    - name: Build list of circuits to set offline (skipping any already offline)
      ansible.builtin.set_fact:
        circuits_to_offline: >-
          {{
            all_circuits
            | selectattr('cid', 'in', offline_circuits)
            | rejectattr('status.value', 'eq', 'offline')
            | list
          }}

    - name: Report circuits being set offline
      ansible.builtin.debug:
        msg: >-
          Setting {{ circuits_to_offline | length }} circuit(s) to offline:
          {{ circuits_to_offline | map(attribute='cid') | join(', ') | default('none — all already offline') }}
        verbosity: 0

    - name: Set circuits to offline
      netbox.netbox.netbox_circuit:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          cid: "{{ item.cid }}"
          status: "Offline"
        state: present
      loop: "{{ circuits_to_offline }}"
      loop_control:
        label: "{{ item.cid }}"

    - name: All done
      ansible.builtin.debug:
        msg: >-
          Reset complete.
          {{ primary_circuit }} is Active. IPLC-GB-AT-SEC is Offline.
          {{ circuits_to_activate | length }} other circuit(s) restored to Active.
          NetBox and Visual Explorer are back to starting state.
        verbosity: 0
