---
# pb_circuit_failover.yml
#
# Automated circuit failover driven by NetBox as the Source of Truth.
#
# Triggered by a NetBox webhook (via AAP workflow) when a circuit status
# changes to 'offline'. Can also be run manually for testing.
#
# What it does:
#   1. Queries the failed circuit from NetBox
#   2. Discovers the A/Z sites from circuit terminations
#   3. Finds the best available backup circuit between the same sites
#   4. Simulates router configuration updates (stub — no real device access)
#   5. Updates NetBox: marks primary offline, backup active
#
# Report generation and deployment is handled by pb_deploy_report.yml,
# which runs as the second step in the Circuit Failover workflow.
#
# Usage (manual):
#   ansible-playbook ansible/pb_circuit_failover.yml
#   ansible-playbook ansible/pb_circuit_failover.yml \
#     --extra-vars "failed_circuit=IPLC-GB-JP-PRI"
#
# Usage (from AAP workflow):
#   Pass the circuit CID in the extra_vars payload as 'failed_circuit'.

- name: "Automated Circuit Failover — {{ failed_circuit }}"
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - vars/netbox_creds.yml

  vars:
    failed_circuit: "IPLC-GB-AT-PRI"
    report_dir: "{{ playbook_dir }}/reports"
    router_username: "{{ lookup('env', 'ANSIBLE_NET_USERNAME') | default('iosuser', true) }}"
    router_password: "{{ lookup('env', 'ANSIBLE_NET_PASSWORD') | default(ansible_password | default(''), true) }}"
    router_primary_gw: "172.16.0.1"
    router_backup_gw: "172.16.1.1"

  tasks:

    # ── Setup ─────────────────────────────────────────────────────────────────

    - name: Create report directory
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: "0755"

    # ── Query failed circuit ───────────────────────────────────────────────────

    - name: Query failed circuit from NetBox
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/?cid={{ failed_circuit }}"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      register: failed_result

    - name: Validate circuit exists
      ansible.builtin.assert:
        that: failed_result.json.count > 0
        fail_msg: "Circuit {{ failed_circuit }} not found in NetBox"

    - name: Set primary circuit facts
      ansible.builtin.set_fact:
        primary: "{{ failed_result.json.results[0] }}"

    - name: Skip if circuit is not in a failed state
      ansible.builtin.meta: end_play
      when: primary.status.value not in ['offline', 'failed']

    # ── Discover sites from terminations ──────────────────────────────────────

    - name: Query circuit terminations
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuit-terminations/?circuit_id={{ primary.id }}"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      register: primary_terms

    - name: Debug terminations response
      ansible.builtin.debug:
        msg: "Terminations count={{ primary_terms.json.count }} results={{ primary_terms.json.results | map(attribute='term_side') | list }}"

    - name: Assert terminations exist for both sides
      ansible.builtin.assert:
        that:
          - primary_terms.json.results | selectattr('term_side', 'eq', 'A') | list | length > 0
          - primary_terms.json.results | selectattr('term_side', 'eq', 'Z') | list | length > 0
        fail_msg: >-
          Circuit {{ failed_circuit }} (id={{ primary.id }}) is missing A/Z terminations in NetBox.
          Found {{ primary_terms.json.count }} termination(s):
          {{ primary_terms.json.results | map(attribute='term_side') | list }}.
          Please add site terminations for this circuit in NetBox.

    - name: Set A-side and Z-side sites
      ansible.builtin.set_fact:
        a_side_site: "{{ (primary_terms.json.results | selectattr('term_side', 'eq', 'A') | first).termination }}"
        z_side_site: "{{ (primary_terms.json.results | selectattr('term_side', 'eq', 'Z') | first).termination }}"

    - name: Show discovered sites
      ansible.builtin.debug:
        msg: >-
          {{ failed_circuit }} connects
          {{ a_side_site.display }} ↔ {{ z_side_site.display }}.
          Searching for backup circuits...

    # ── Find backup circuit ───────────────────────────────────────────────────

    - name: Query dd-tagged circuits at A-side site
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/?site_id={{ a_side_site.id }}&tag=dd"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      register: a_site_circuits

    - name: Query dd-tagged circuits at Z-side site
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/?site_id={{ z_side_site.id }}&tag=dd"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      register: z_site_circuits

    - name: Find circuits present at both sites (excluding the failed one)
      ansible.builtin.set_fact:
        z_circuit_ids: "{{ z_site_circuits.json.results | map(attribute='id') | list }}"

    - name: Build backup candidate list
      ansible.builtin.set_fact:
        backup_candidates: >-
          {{
            a_site_circuits.json.results
            | selectattr('id', 'in', z_circuit_ids)
            | rejectattr('id', 'eq', primary.id)
            | list
          }}

    - name: Fail if no backup found
      ansible.builtin.assert:
        that: backup_candidates | length > 0
        fail_msg: >-
          No active backup circuit found between
          {{ a_side_site.display }} and {{ z_side_site.display }}

    - name: Select best backup (highest commit rate)
      ansible.builtin.set_fact:
        backup: "{{ backup_candidates | sort(attribute='commit_rate', reverse=true) | first }}"

    - name: Show backup selection
      ansible.builtin.debug:
        msg: |
          Found {{ backup_candidates | length }} backup candidate(s):
          {% for c in backup_candidates | sort(attribute='commit_rate', reverse=true) %}
            {{ '→' if c.id == backup.id else ' ' }} {{ c.cid }} ({{ c.provider.name }}, {{ c.commit_rate // 1000 }} Mbps)
          {% endfor %}
          Selected: {{ backup.cid }}

    # ── Query backup terminations ──────────────────────────────────────────────

    - name: Query backup circuit terminations
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuit-terminations/?circuit_id={{ backup.id }}"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      register: backup_terms

    - name: Set backup site labels
      ansible.builtin.set_fact:
        backup_a_site: "{{ (backup_terms.json.results | selectattr('term_side', 'eq', 'A') | first).termination.display }}"
        backup_z_site: "{{ (backup_terms.json.results | selectattr('term_side', 'eq', 'Z') | first).termination.display }}"

    # ── Discover routers via cable connections (NetBox SoT) ───────────────────
    # The realistic NetBox model: each circuit termination is connected to a
    # specific router interface via a Cable. Follow the cable from each
    # termination to the device on the other end. No more guessing by site+tag.

    - name: Build per-termination router descriptors via cable link_peers
      ansible.builtin.set_fact:
        cable_routers: "{{ cable_routers | default([]) + [router_entry] }}"
      vars:
        peer: "{{ item.0.link_peers[0] }}"
        router_entry:
          circuit: "{{ item.1.cid }}"
          role: "{{ item.1.role }}"
          side: "{{ item.0.term_side }}"
          site: "{{ item.0.termination.display }}"
          name: "{{ peer.device.name }}"
          id: "{{ peer.device.id }}"
          interface: "{{ peer.name }}"
      loop: >-
        {{
          (primary_terms.json.results | product([{'cid': primary.cid, 'role': 'failed'}]) | list)
          +
          (backup_terms.json.results | product([{'cid': backup.cid, 'role': 'backup'}]) | list)
        }}
      loop_control:
        label: "{{ item.1.cid }}/{{ item.0.term_side }}"
      when:
        - item.0.link_peers is defined
        - (item.0.link_peers | length) > 0

    - name: Fetch full device records (for primary_ip4)
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/devices/{{ item.id }}/"
        headers:
          Authorization: "Token {{ netbox_token }}"
        return_content: true
        validate_certs: false
      loop: "{{ cable_routers }}"
      loop_control:
        label: "{{ item.name }}"
      register: device_lookups

    - name: Annotate each router with primary_ip and is_real flag
      ansible.builtin.set_fact:
        all_routers: "{{ all_routers | default([]) + [annotated] }}"
      loop: "{{ cable_routers | zip(device_lookups.results) | list }}"
      loop_control:
        label: "{{ item.0.name }}"
      vars:
        device: "{{ item.1.json }}"
        ip_addr: "{{ device.primary_ip4.address.split('/')[0] if device.primary_ip4 else '' }}"
        ip_octets: "{{ ip_addr.split('.') if ip_addr else ['0','0','0','0'] }}"
        is_rfc1918: >-
          {{ ip_addr.startswith('10.')
             or ip_addr.startswith('192.168.')
             or (ip_addr.startswith('172.') and (ip_octets[1] | int) >= 16 and (ip_octets[1] | int) <= 31) }}
        annotated: "{{ item.0 | combine({'primary_ip': ip_addr, 'is_real': (ip_addr != '' and not is_rfc1918)}) }}"

    - name: Show discovered routers
      ansible.builtin.debug:
        msg: |
          Routers discovered via NetBox cable connections:
          {% for r in all_routers %}
            {{ r.circuit }}/{{ r.side }}: {{ r.name }} ({{ r.site }}) {{ r.interface }}
              primary_ip={{ r.primary_ip or 'NONE' }}  reachable={{ r.is_real }}
          {% endfor %}

    # ── Register reachable routers for real config push ───────────────────────
    # Only routers with a publicly-routable primary IP get a real config push.
    # Simulated routers (RFC1918 IPs) are noted in the report but not contacted.

    - name: Register reachable routers in dynamic inventory
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: cisco_target_routers
        ansible_host: "{{ item.primary_ip }}"
        ansible_user: "{{ router_username }}"
        ansible_password: "{{ router_password }}"
        ansible_network_os: cisco.ios.ios
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_cli_ssh_type: paramiko
        ansible_become: true
        ansible_become_method: enable
        ansible_host_key_checking: false
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        primary_gw: "{{ router_primary_gw }}"
        backup_gw: "{{ router_backup_gw }}"
        router_role: "{{ item.role }}"
        router_circuit: "{{ item.circuit }}"
      loop: "{{ all_routers | selectattr('is_real') | list }}"
      loop_control:
        label: "{{ item.name }} ({{ item.primary_ip }})"

    - name: Log simulated routers (no EC2 instance — config push skipped)
      ansible.builtin.debug:
        msg: >-
          [SIMULATED] {{ item.circuit }}/{{ item.side }} router {{ item.name }}
          ({{ item.site }} interface {{ item.interface }}, ip {{ item.primary_ip or 'NONE' }}):
          would push interface state change reflecting circuit {{ item.role }}.
      loop: "{{ all_routers | rejectattr('is_real') | list }}"
      loop_control:
        label: "{{ item.name }}"

    # ── Update NetBox ─────────────────────────────────────────────────────────
    # These are real writes — this is what updates the Visual Explorer map.

    - name: Mark failed circuit as offline in NetBox
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/{{ primary.id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          status: "offline"
        status_code: 200
        validate_certs: false
      register: primary_update
      when: primary.status.value != 'offline'

    - name: Confirm primary circuit updated
      ansible.builtin.debug:
        msg: >-
          {{ primary.cid }}:
          {{ primary.status.label }} → offline
          (update skipped — already offline)
      when: primary.status.value == 'offline'

    - name: Confirm primary circuit updated (was changed)
      ansible.builtin.debug:
        msg: >-
          {{ primary.cid }}:
          {{ primary.status.label }} → {{ primary_update.json.status.label }}
      when: primary.status.value != 'offline'

    - name: Set backup circuit to active in NetBox
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/circuits/circuits/{{ backup.id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          status: "active"
        status_code: 200
        validate_certs: false
      register: backup_update
      when: backup.status.value != 'active'

    - name: Confirm backup circuit active (no change needed)
      ansible.builtin.debug:
        msg: >-
          {{ backup.cid }}: already active — no update needed
      when: backup.status.value == 'active'

    - name: Confirm backup circuit active (was changed)
      ansible.builtin.debug:
        msg: >-
          {{ backup.cid }}:
          {{ backup.status.label }} → {{ backup_update.json.status.label }}
      when: backup.status.value != 'active'

    - name: Failover complete
      ansible.builtin.debug:
        msg: |
          Failover complete for {{ failed_circuit }}
            Primary:  {{ primary.cid }} -> Offline
            Backup:   {{ backup.cid }} ({{ backup.provider.name }}, {{ backup.commit_rate // 1000 }} Mbps)
            Routers:  config pushed to {{ all_routers | map(attribute='name') | join(', ') }}
          Report will be generated and deployed by the next workflow step.

# ── Play 2: Push failover config to reachable routers ────────────────────────
# Runs against routers that Play 1 registered in cisco_target_routers — those
# whose primary_ip is publicly routable (real EC2 instances). Simulated routers
# (RFC1918 IPs) were already logged in Play 1 and are skipped here.

- name: "Push failover route to reachable routers"
  hosts: cisco_target_routers
  gather_facts: false
  ignore_unreachable: true

  tasks:

    - name: Push router config (best-effort — failures don't stop the workflow)
      block:
        - name: Remove primary default route and activate backup route
          cisco.ios.ios_config:
            lines:
              - "no ip route 0.0.0.0 0.0.0.0 {{ hostvars[inventory_hostname]['primary_gw'] }}"
              - "ip route 0.0.0.0 0.0.0.0 {{ hostvars[inventory_hostname]['backup_gw'] }}"
            save_when: changed

        - name: Verify backup route is active
          cisco.ios.ios_command:
            commands:
              - show ip route 0.0.0.0
          register: route_check

        - name: Confirm route change applied
          ansible.builtin.debug:
            msg: "{{ route_check.stdout_lines }}"
      rescue:
        - name: Router config push failed — continuing so report deploys
          ansible.builtin.debug:
            msg: >-
              Router config push to {{ inventory_hostname }} failed
              ({{ ansible_failed_result.msg | default('unknown') }}).
              NetBox state is correct; continuing to report deployment.
