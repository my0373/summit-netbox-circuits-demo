---
# EDA Rulebook: NetBox Circuit Failover
#
# Listens for NetBox webhook events via an EDA event stream.
# When a circuit is set to offline or failed, triggers the
# Circuit Failover Workflow in Ansible Automation Platform.
#
# Event-Driven Ansible receives events from NetBox via webhook,
# evaluates conditions, and launches the AAP workflow automatically.
#
# NetBox 4.5 default webhook payload structure:
#   event.payload.object_type = "circuits.circuit"
#   event.payload.data.status.value = "offline" | "active" | "failed"
#   event.payload.data.cid = "IPLC-GB-AT-PRI"

- name: NetBox Circuit Failover
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:

    - name: Circuit failure detected — trigger failover workflow
      condition: >
        event.payload.object_type == "circuits.circuit" and
        event.payload.data.status.value in ["offline", "failed"]
      action:
        run_workflow_template:
          name: "Circuit Failover Workflow"
          organization: "Summit"
          job_args:
            extra_vars:
              failed_circuit: "{{ event.payload.data.cid }}"
