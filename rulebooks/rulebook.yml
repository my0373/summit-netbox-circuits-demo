---
# EDA Rulebook: NetBox Circuit Failover
#
# Listens for NetBox webhook events via an EDA event stream.
# When a circuit is set to offline or failed, triggers the
# Circuit Failover Workflow in AAP controller.

- name: NetBox Circuit Failover
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:

    # Match on the wrapped form (event.payload.*) — what NetBox sends via
    # AAP EDA event streams when the body comes through the webhook source.
    - name: Circuit offline (payload.* form)
      condition: >
        event.payload.model == "circuit" and
        event.payload.data.status.value == "offline"
      action:
        run_workflow_template:
          name: "Circuit Failover Workflow"
          organization: "Summit"
          job_args:
            extra_vars:
              failed_circuit: "{{ event.payload.data.cid }}"

    - name: Circuit failed (payload.* form)
      condition: >
        event.payload.model == "circuit" and
        event.payload.data.status.value == "failed"
      action:
        run_workflow_template:
          name: "Circuit Failover Workflow"
          organization: "Summit"
          job_args:
            extra_vars:
              failed_circuit: "{{ event.payload.data.cid }}"

    # Match on the unwrapped form (event.* directly) — covers the case where
    # the event stream delivers the body without wrapping it in 'payload'.
    - name: Circuit offline (event.* form)
      condition: >
        event.model == "circuit" and
        event.data.status.value == "offline"
      action:
        run_workflow_template:
          name: "Circuit Failover Workflow"
          organization: "Summit"
          job_args:
            extra_vars:
              failed_circuit: "{{ event.data.cid }}"

    - name: Circuit failed (event.* form)
      condition: >
        event.model == "circuit" and
        event.data.status.value == "failed"
      action:
        run_workflow_template:
          name: "Circuit Failover Workflow"
          organization: "Summit"
          job_args:
            extra_vars:
              failed_circuit: "{{ event.data.cid }}"

    # Debug catch-all — log every event regardless of structure so we can
    # inspect the actual payload shape. Uses a tautology that's syntactically
    # valid: any event will have *some* key, so checking 'event.payload is
    # defined or event.payload is not defined' is always true.
    - name: DEBUG — log every event
      condition: event.payload is defined or event.payload is not defined
      action:
        debug:
          msg: "EVENT_DEBUG: {{ event }}"
