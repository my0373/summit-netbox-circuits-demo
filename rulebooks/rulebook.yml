---
# EDA Rulebook: NetBox Circuit Failover
#
# Listens for NetBox webhook events via an EDA event stream.
# When a circuit is set to offline or failed, triggers the
# Circuit Failover Workflow in AAP controller.
#
# NetBox 4.x webhook payload structure (verified from EDA logs):
#   event.payload.object_type      → "circuits.circuit"
#   event.payload.data.status.value → "active" | "offline" | ...
#   event.payload.data.cid          → e.g. "IPLC-GB-AT-PRI"

- name: NetBox Circuit Failover
  hosts: all
  sources:
    - name: netbox_webhook
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:

    - name: Circuit set to offline — trigger failover workflow
      condition: >
        event.payload.object_type == "circuits.circuit" and
        event.payload.data.status.value == "offline"
      action:
        run_workflow_template:
          name: "Circuit Failover Workflow"
          organization: "Summit"
          job_args:
            extra_vars:
              failed_circuit: "{{ event.payload.data.cid }}"

    - name: Circuit set to failed — trigger failover workflow
      condition: >
        event.payload.object_type == "circuits.circuit" and
        event.payload.data.status.value == "failed"
      action:
        run_workflow_template:
          name: "Circuit Failover Workflow"
          organization: "Summit"
          job_args:
            extra_vars:
              failed_circuit: "{{ event.payload.data.cid }}"
